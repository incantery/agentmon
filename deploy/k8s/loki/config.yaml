auth_enabled: false
server:
  http_listen_port: 3100
  # agentmon pushes one spool segment per request; headroom over the 4MB
  # default so a full segment (plus JSON overhead) always fits.
  grpc_server_max_recv_msg_size: 16777216
  grpc_server_max_send_msg_size: 16777216
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
limits_config:
  # agentmon backfills historical transcripts; old timestamps must land.
  reject_old_samples: false
