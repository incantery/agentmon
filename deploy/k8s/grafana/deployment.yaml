apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: agentmon
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_AUTH_BASIC_ENABLED, value: "false" }
          volumeMounts:
            - { name: ds, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dbprov, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: alerting, mountPath: /etc/grafana/provisioning/alerting }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: ds
          configMap: { name: grafana-datasources }
        - name: dbprov
          configMap: { name: grafana-dashboards-provider }
        - name: alerting
          configMap: { name: grafana-alerting }
        - name: dashboards
          configMap: { name: grafana-dashboard-agentmon }
